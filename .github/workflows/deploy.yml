name: Deploy Bot

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Update code
        run: |
          cd ~/bots/Darth-Vaders-World
          git pull

      - name: Restart Docker bot
        run: |
          cd ~/bots/Darth-Vaders-World
          docker compose down
          docker compose up -d --build